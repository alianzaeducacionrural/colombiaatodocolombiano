<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Colombia a Todo Colombiano</title>
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var query = search.slice(1) + (hash ? "&hash=" + hash.slice(1) : "");
      window.location.replace(
        window.location.origin + "/colombiaatodocolombiano/?" +
        (query ? query + "&" : "") + "p=" + encodeURIComponent(path.slice(1))
      );
    </script>
  </head>
  <body></body>
</html>
