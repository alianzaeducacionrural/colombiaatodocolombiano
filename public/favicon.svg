  <g clip-path="url(#c)">
    <rect x="4" y="4"  width="56" height="28" fill="#FCD116"/>
    <rect x="4" y="32" width="56" height="14" fill="#003893"/>
    <rect x="4" y="46" width="56" height="14" fill="#CE1126"/>
  </g>
  <!-- Trofeo blanco encima -->
  <text x="32" y="40" font-size="26" text-anchor="middle" font-family="serif">🏆</text>
</svg>
