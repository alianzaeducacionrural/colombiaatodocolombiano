<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo círculo oscuro -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>
  <!-- Franjas bandera Colombia: amarillo (50%), azul (25%), rojo (25%) -->
